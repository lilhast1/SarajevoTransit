server:
  port: 8080

spring:
  application:
    name: apigateway
  cloud:
    gateway:
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true
      routes:
        - id: userservice-route
          uri: lb://userservice
          predicates:
            - Path=/api/v1/users/**, /api/users/**
        - id: feedbackservice-route
          uri: lb://feedbackservice
          predicates:
            - Path=/api/v1/workflows/**, /api/v1/reviews/**, /api/v1/reports/**
        - id: userservice-discovery-benchmark
          uri: lb://userservice
          predicates:
            - Path=/api/v1/discovery/benchmark/**, /api/discovery/benchmark/**
        - id: feedbackservice-discovery
          uri: lb://feedbackservice
          predicates:
            - Path=/api/v1/discovery/**, /api/discovery/**

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_SERVER_URL:http://localhost:8761/eureka}
    healthcheck:
      enabled: true
  instance:
    prefer-ip-address: true
    instance-id: ${spring.application.name}:${spring.cloud.client.hostname}:${server.port}
    lease-renewal-interval-in-seconds: 5
    lease-expiration-duration-in-seconds: 10

management:
  endpoints:
    web:
      exposure:
        include: "gateway,health,info,metrics"
  endpoint:
    gateway:
      enabled: true
    health:
      show-details: always
