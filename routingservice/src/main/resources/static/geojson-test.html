<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Routing GeoJSON Test</title>
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
    crossorigin=""
  >
  <style>
    body { font-family: Arial, sans-serif; margin: 0; padding: 0; background: #f6f8fb; }
    .container { max-width: 1100px; margin: 20px auto; padding: 0 16px; }
    .panel { background: #fff; border: 1px solid #d9e0ea; border-radius: 8px; padding: 12px; margin-bottom: 12px; }
    #map { height: 520px; border-radius: 8px; border: 1px solid #d9e0ea; }
    .row { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
    input { padding: 8px; border: 1px solid #bfc9d8; border-radius: 6px; min-width: 180px; }
    button { padding: 8px 12px; border: 0; border-radius: 6px; background: #1557ff; color: #fff; cursor: pointer; }
    button:hover { background: #0c46d8; }
    #status { font-size: 14px; color: #344054; }
    pre { background: #0f172a; color: #dbe7ff; padding: 12px; border-radius: 8px; overflow: auto; max-height: 260px; }
  </style>
</head>
<body>
  <div class="container">
    <div class="panel">
      <div class="row">
        <label for="directionId"><strong>Direction ID:</strong></label>
        <input id="directionId" type="number" value="271" min="1">
        <button id="loadBtn" type="button">Load GeoJSON</button>
        <span id="status">Ready.</span>
      </div>
    </div>

    <div id="map" class="panel"></div>

    <div class="panel">
      <strong>Response</strong>
      <pre id="jsonOutput">{}</pre>
    </div>
  </div>

  <script
    src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
    integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
    crossorigin=""
  ></script>
  <script>
    const map = L.map('map').setView([43.8563, 18.4131], 12);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      maxZoom: 19,
      attribution: '&copy; OpenStreetMap contributors'
    }).addTo(map);

    let geoLayer = null;

    async function loadGeoJson() {
      const directionId = document.getElementById('directionId').value;
      const status = document.getElementById('status');
      const jsonOutput = document.getElementById('jsonOutput');

      if (!directionId) {
        status.textContent = 'Please enter direction ID.';
        return;
      }

      status.textContent = 'Loading...';

      try {
        const response = await fetch(`/api/v1/directions/${directionId}/geojson`);
        const data = await response.json();

        jsonOutput.textContent = JSON.stringify(data, null, 2);

        if (!response.ok) {
          if (geoLayer) {
            map.removeLayer(geoLayer);
            geoLayer = null;
          }
          status.textContent = `Error ${response.status}: ${data.message || 'Request failed'}`;
          return;
        }

        if (geoLayer) {
          map.removeLayer(geoLayer);
        }

        geoLayer = L.geoJSON(data, {
          style: { color: '#1557ff', weight: 5 }
        }).addTo(map);

        const bounds = geoLayer.getBounds();
        if (bounds.isValid()) {
          map.fitBounds(bounds, { padding: [20, 20] });
        }

        status.textContent = `Loaded route with ${data.properties?.pointCount ?? 0} points.`;
      } catch (error) {
        status.textContent = `Network error: ${error.message}`;
      }
    }

    document.getElementById('loadBtn').addEventListener('click', loadGeoJson);
  </script>
</body>
</html>
