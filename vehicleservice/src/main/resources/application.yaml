server:
  port: ${SERVER_PORT:8083}

spring:
  application:
    name: vehicle-service
  
  datasource:
    url: jdbc:postgresql://localhost:5432/sarajevo_transit_vehicle
    username: postgres
    password: ${DB_PASSWORD:mysecretpassword}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      # 'update' automatically creates/modifies tables based on your Java classes.
      # Similar to EF Core's automatic migrations during development.
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_SERVER_URL:http://localhost:8761/eureka}
    healthcheck:
      enabled: true
  instance:
    prefer-ip-address: true
    instance-id: ${spring.application.name}:${spring.cloud.client.hostname}:${server.port}
    lease-renewal-interval-in-seconds: 5
    lease-expiration-duration-in-seconds: 10

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always